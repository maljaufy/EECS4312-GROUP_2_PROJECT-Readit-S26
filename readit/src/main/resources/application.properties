# =============================================================================
# PostgreSQL Database
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/readit
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=readit
spring.datasource.password=readit

# =============================================================================
# JPA / Hibernate - FOR POSTGRESQL
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# =============================================================================
# Kafka
# =============================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false

# =============================================================================
# JWT
# =============================================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# =============================================================================
# Disable LDAP
# =============================================================================
spring.data.ldap.repositories.enabled=false

# =============================================================================
# Vaadin
# =============================================================================
vaadin.production-mode=false
vaadin.dev-mode.prebuild-frontend=true

# =============================================================================
# Logging
# =============================================================================
logging.level.com.redditclone=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.postgresql=DEBUG