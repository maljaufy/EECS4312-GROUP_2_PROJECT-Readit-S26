# =============================================================================
# PostgreSQL Database
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/readit
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=readit
spring.datasource.password=readit

# =============================================================================
# JPA / Hibernate - FOR POSTGRESQL
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Baseline existing developer databases, then apply non-destructive migrations.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================================================
# Kafka
# =============================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# =============================================================================
# JWT
# =============================================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# =============================================================================
# Disable LDAP
# =============================================================================
spring.data.ldap.repositories.enabled=false

# =============================================================================
# Vaadin
# =============================================================================
vaadin.production-mode=false
vaadin.dev-mode.prebuild-frontend=true

# =============================================================================
# Logging
# =============================================================================
logging.level.com.redditclone=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.postgresql=DEBUG

# =============================================================================
# Observability
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.metrics.distribution.percentiles-histogram.readit.comments.latency=true

# =============================================================================
# Vote persistence retry (optimistic-lock and concurrent insert conflicts)
# =============================================================================
resilience4j.retry.instances.votePersistence.max-attempts=3
resilience4j.retry.instances.votePersistence.wait-duration=50ms
resilience4j.retry.instances.votePersistence.enable-exponential-backoff=true
resilience4j.retry.instances.votePersistence.exponential-backoff-multiplier=2
resilience4j.retry.instances.votePersistence.retry-exceptions=jakarta.persistence.OptimisticLockException,org.springframework.orm.ObjectOptimisticLockingFailureException,org.springframework.dao.OptimisticLockingFailureException,org.springframework.dao.DataIntegrityViolationException
