spring:
  application:
    name: events-monolith

  kafka:
    bootstrap-servers: localhost:9092

    # ── Producer ──────────────────────────────────────────────────────────────
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all              # wait for all ISR replicas to acknowledge
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

    # ── Consumer ──────────────────────────────────────────────────────────────
    consumer:
      group-id: post-events-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.events.post.model"
      enable-auto-commit: false  # manual ack for at-least-once delivery

    # ── Listener ──────────────────────────────────────────────────────────────
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3           # 3 consumer threads (≤ partition count)

# ── App-level topic names (keeps them in one place) ─────────────────────────
app:
  kafka:
    topics:
      post-events: post.events 
      vote-events: vote.events
      comment-events: comment.events